<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp Thư Ẩn Danh - Nơi Gửi Gắm Tâm Tư</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        /* --- ĐỊNH NGHĨA CÁC THEME GIAO DIỆN --- */
        
        /* 1. Theme Chòm Sao (Bầu trời đêm đầy sao) */
        body.theme-stars {
            background: radial-gradient(circle at bottom, #0d1b2a 0%, #010811 100%);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 30px);
            background-size: 400px 400px, 280px 280px, 190px 190px;
            background-position: 0 0, 50px 70px, 110px 150px;
            color: #f8f9fa;
        }
        body.theme-stars .container { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.15); }
        body.theme-stars h1 { color: #ffffff; text-shadow: 0 2px 8px rgba(255, 255, 255, 0.2); }
        body.theme-stars p.description { color: #cbd5e1; }
        body.theme-stars .admin-section { background: rgba(15, 23, 42, 0.85); border-color: rgba(255,255,255,0.3); }
        body.theme-stars .admin-title { color: #94a3b8; }
        body.theme-stars .letter-item { background: rgba(255, 255, 255, 0.05); border-left-color: #64748b; color: #e2e8f0; }

        /* 2. Theme Sáng (Trắng chủ đạo) */
        body.theme-light {
            background: #f1f5f9;
            color: #0f172a;
        }
        body.theme-light .container { background: #ffffff; border-color: #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        body.theme-light h1 { color: #1e293b; text-shadow: none; }
        body.theme-light p.description { color: #475569; }
        body.theme-light .admin-section { background: #ffffff; border-color: #cbd5e1; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        body.theme-light .admin-title { color: #334155; border-bottom-color: #e2e8f0; }
        body.theme-light .letter-item { background: #f8fafc; border-left-color: #475569; color: #334155; }
        body.theme-light .no-letter { color: #94a3b8; }

        /* 3. Theme Tối (Đen/Xám sẫm chủ đạo) */
        body.theme-dark {
            background: #0f172a;
            color: #f8f9fa;
        }
        body.theme-dark .container { background: #1e293b; border-color: #334155; }
        body.theme-dark h1 { color: #f1f5f9; text-shadow: none; }
        body.theme-dark p.description { color: #94a3b8; }
        body.theme-dark .admin-section { background: #1e293b; border-color: #475569; }
        body.theme-dark .admin-title { color: #cbd5e1; border-bottom-color: #334155; }
        body.theme-dark .letter-item { background: #1e293b; border-color: #334155 #334155 #334155 #94a3b8; color: #e2e8f0; }

        /* --- PHẦN STYLE CHUNG --- */
        body {
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        /* Thanh chọn giao diện đổi màu nền */
        .theme-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .theme-btn {
            padding: 6px 14px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.9rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: transparent;
            color: inherit;
            font-weight: bold;
        }

        .theme-btn.active {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 40px;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p.description {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Khung viết thư (Giữ nguyên phong cách cổ điển dễ viết) */
        .letter-box {
            position: relative;
            background: #fffdf6;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            padding: 25px;
            margin-bottom: 20px;
        }

        .letter-box::before {
            content: '';
            position: absolute;
            left: 35px;
            top: 0;
            width: 1px;
            height: 100%;
            background: #f1a7a7;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: none;
            resize: none;
            outline: none;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #2c3e50;
            padding-left: 25px;
            background: linear-gradient(transparent, transparent 27px, rgba(0,0,0,0.05) 27px, rgba(0,0,0,0.05) 28px);
            background-size: 100% 28px;
        }

        /* Nút gửi thư */
        .btn-send {
            display: block;
            width: 100%;
            padding: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(135deg, #334155, #1e293b);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-send:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #475569, #334155);
        }

        /* Phân tách vùng chủ Web */
        .admin-section {
            width: 100%;
            max-width: 650px;
            border: 1px dashed;
            padding: 25px;
            border-radius: 16px;
        }

        .admin-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }

        .no-letter {
            text-align: center;
            font-style: italic;
            padding: 20px 0;
            color: #94a3b8;
        }

        /* Danh sách thư */
        .letter-item {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
            position: relative;
            border-width: 1px 1px 1px 4px;
            border-style: solid;
        }

        .letter-time {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .letter-content {
            font-size: 1.1rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Times New Roman', Times, serif;
        }
        
        .btn-delete:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="theme-stars"> <div class="theme-switcher">
        <button class="theme-btn active" onclick="changeTheme('stars', this)">Chòm Sao</button>
        <button class="theme-btn" onclick="changeTheme('light', this)">Trắng</button>
        <button class="theme-btn" onclick="changeTheme('dark', this)">Đen</button>
    </div>

    <div class="container">
        <h1>Hộp Thư Ẩn Danh</h1>
        <p class="description">Đừng giữ những gánh nặng tâm lý một mình. Hãy viết hết những điều đè nặng trong lòng bạn vào đây, tôi luôn ở đây để lắng nghe và chia sẻ cùng bạn.</p>
        
        <div class="letter-box">
            <textarea id="sender-text" placeholder="Hãy viết những điều bạn muốn chia sẻ tại đây... (Danh tính của bạn hoàn toàn được bảo mật)"></textarea>
        </div>
        <button class="btn-send" onclick="sendLetter()">Thả Thư Vào Hộp</button>
    </div>

    <div class="admin-section">
        <div class="admin-title">Hòm Thư Đến (Chỉ Chủ Web Nhìn Thấy)</div>
        <div id="letter-list"></div>
    </div>

    <script>
        // Hàm thay đổi Theme nền và đồng bộ màu chữ công khai
        function changeTheme(themeName, element) {
            // Xóa hết class cũ ở body và add class mới vào
            document.body.className = '';
            document.body.classList.add('theme-' + themeName);

            // Cập nhật trạng thái active trên các nút bấm chọn màu nền
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        // --- CÁC HÀM XỬ LÝ DỮ LIỆU ĐÃ CÓ (GIỮ NGUYÊN) ---
        document.addEventListener("DOMContentLoaded", function() {
            displayLetters();
        });

        function sendLetter() {
            const textarea = document.getElementById("sender-text");
            const content = textarea.value.trim();

            if (content === "") {
                alert("Bạn chưa điền tâm tư vào thư kìa!");
                return;
            }

            const now = new Date();
            const timeString = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()} lúc ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

            const newLetter = {
                id: Date.now(),
                time: timeString,
                text: content
            };

            let letters = JSON.parse(localStorage.getItem("anonymous_letters")) || [];
            letters.unshift(newLetter);
            localStorage.setItem("anonymous_letters", JSON.stringify(letters));

            textarea.value = "";
            alert("Bức thư của bạn đã lặng lẽ bay vào hòm thư. Cảm ơn bạn vì đã chia sẻ!");
            displayLetters();
        }

        function displayLetters() {
            const listContainer = document.getElementById("letter-list");
            let letters = JSON.parse(localStorage.getItem("anonymous_letters")) || [];

            if (letters.length === 0) {
                listContainer.innerHTML = '<div class="no-letter">Hiện tại chưa có bức thư ẩn danh nào được gửi đến.</div>';
                return;
            }

            let htmlContent = "";
            letters.forEach(letter => {
                htmlContent += `
                    <div class="letter-item">
                        <button class="btn-delete" onclick="deleteLetter(${letter.id})">[Xóa thư]</

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp thư cất giữ cảm xúc</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* THAY ĐỔI: Chuyển background sang tông đen xám sẫm kết hợp sao li ti phủ khắp màn hình */
            background: radial-gradient(circle at bottom, #141b29 0%, #0b0f17 100%);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            
            font-family: 'Times New Roman', Times, serif;
            
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        h1 {
            /* THAY ĐỔI: Màu chữ tiêu đề trắng sáng tương phản tốt với nền đen */
            color: #000000;
            margin-bottom: 10px;
            font-size: 2.2rem;
            text-align: center;
            text-shadow: 0 2px 10px rgba(255,255,255,0.3);
        }

        p.subtitle {
            /* THAY ĐỔI: Chữ phụ đề màu xám bạc dịu mắt trên nền tối */
            color: #000000;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        /* Thanh chọn mẫu giấy */
        .color-picker {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1); /* Làm mờ nhẹ thanh chọn hợp với nền đen */
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .color-dot:hover {
            transform: scale(1.15);
        }

        .color-dot.active {
            border-color: #ffffff;
            transform: scale(1.1);
        }

        /* Các mẫu màu giấy */
        .dot-white { background: #ffffff; }
        .dot-pink { background: #ffd3b6; }
        .dot-yellow { background: #fff59d; }
        .dot-dark { background: #37474f; }

        /* Vùng không gian chứa giấy và thùng rác */
        .workspace {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Đồ họa miếng giấy gốc */
        .paper-container {
            width: 90%;
            max-width: 400px;
            height: 300px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-radius: 2px;
            position: relative;
            transition: background 0.3s ease, transform 1.5s ease-in-out;
            transform-origin: center center;
            z-index: 2;
        }

        /* Đường lề đỏ */
        .paper-container::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: #ff8585;
        }

        /* Ô chứa text giả lập dòng kẻ */
        .paper-textarea {
            width: 100%;
            height: 100%;
            padding: 20px 20px 20px 55px;
            border: none;
            resize: none;
            outline: none;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #444;
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(transparent, transparent 27px, rgba(0,0,0,0.08) 27px, rgba(0,0,0,0.08) 28px);
            background-size: 100% 28px;
            transition: color 0.3s ease;
        }

        /* Cấu hình màu sắc động cho các mẫu giấy thông qua Class */
        .paper-white { background-color: #ffffff; }
        .paper-white textarea { color: #444; }

        .paper-pink { background-color: #ffd3b6; }
        .paper-pink textarea { color: #5d4037; }

        .paper-yellow { background-color: #fff59d; }
        .paper-yellow textarea { color: #4e342e; }

        .paper-dark { background-color: #37474f; }
        .paper-dark textarea { color: #eceff1; background: linear-gradient(transparent, transparent 27px, rgba(255,255,255,0.15) 27px, rgba(255,255,255,0.15) 28px); background-size: 100% 28px; }

        /* Nút trút giận */
        .vent-btn {
            margin-top: 15px;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
            color: white;
            background-color: #d9534f;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 83, 79, 0.4);
            transition: all 0.2s ease;
            z-index: 3;
        }

        .vent-btn:hover {
            background-color: #c9302c;
            transform: translateY(-2px);
        }

        .vent-btn:active {
            transform: translateY(1px);
        }

        /* Đồ họa cái thùng rác */
        .trash-can {
            position: absolute;
            bottom: -10px;
            width: 80px;
            height: 90px;
            background: #cbd5e1;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            opacity: 0;
            transform: translateY(50px) scale(0.8);
            transition: all 0.5s ease;
            z-index: 1;
        }

        .trash-can::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -5px;
            width: 90px;
            height: 12px;
            background: #94a3b8;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .trash-can.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .trash-can.open::before {
            transform: rotate(-45deg) translate(-10px, -10px);
        }

        /* ANIMATION */
        .crumple-and-throw {
            animation: crumple 1s forwards, throw 0.8s 0.8s forwards;
        }

        @keyframes crumple {
            0% { transform: scale(1) rotate(0deg); border-radius: 2px; }
            100% { 
                transform: scale(0.15) rotate(720deg); 
                border-radius: 50%; 
                box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
            }
        }

        @keyframes throw {
            0% { transform: scale(0.15) translateY(0) rotate(720deg); opacity: 1; }
            100% { transform: scale(0.05) translateY(240px) rotate(1080deg); opacity: 0; }
        }

        .trash-away {
            animation: walkAway 1s forwards;
        }

        @keyframes walkAway {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(350px, -60px) scale(0.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Hộp thư cất giữ cảm xúc</h1>
    <p class="subtitle">Chọn một màu giấy</p>

    <div class="color-picker" id="picker-container">
        <div class="color-dot dot-white active" onclick="changePaperColor('white', this)"></div>
        <div class="color-dot dot-pink" onclick="changePaperColor('pink', this)"></div>
        <div class="color-dot dot-yellow" onclick="changePaperColor('yellow', this)"></div>
        <div class="color-dot dot-dark" onclick="changePaperColor('dark', this)"></div>
    </div>

    <div class="workspace">
        <div class="paper-container paper-white" id="paper">
            <textarea class="paper-textarea" id="text-area" placeholder="..."></textarea>
        </div>

        <div class="trash-can" id="trash"></div>
    </div>

    <button class="vent-btn" id="vent-btn" onclick="startVesting()">Xóa đi!</button>

    <script>
        function changePaperColor(colorName, element) {
            const paper = document.getElementById('paper');
            paper.classList.remove('paper-white', 'paper-pink', 'paper-yellow', 'paper-dark');
            paper.classList.add('paper-' + colorName);

            const dots = document.querySelectorAll('.color-dot');
            dots.forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');
        }

        function startVesting() {
            const paper = document.getElementById('paper');
            const textarea = document.getElementById('text-area');
            const trash = document.getElementById('trash');
            const btn = document.getElementById('vent-btn');
            const picker = document.getElementById('picker-container');

            if (textarea.value.trim() === "") {
                alert("Hãy viết gì đó trước khi ném đi nhé!");
                return;
            }

            btn.disabled = true;
            textarea.disabled = true;
            picker.style.pointerEvents = 'none';

            trash.classList.add('show');

            setTimeout(() => {
                trash.classList.add('open');
                paper.classList.add('crumple-and-throw');
            }, 600);

            setTimeout(() => {
                trash.classList.remove('open');
            }, 1700);

            setTimeout(() => {
                trash.classList.add('trash-away');
            }, 2200);

            setTimeout(() => {
                textarea.value = "";
                textarea.disabled = false;
                
                paper.classList.remove('crumple-and-throw');
                trash.className = "trash-can";
                
                btn.disabled = false;
                picker.style.pointerEvents = 'auto';
            }, 3500);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Trút Giận - Nơi Vứt Bỏ Muộn Phiền</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #eef2f3;
            background: linear-gradient(to right, #eef2f3, #8e9eab);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, 'Times New Roman', Times, serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Vùng không gian chứa giấy và thùng rác */
        .workspace {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Đồ họa miếng giấy tập */
        .paper-container {
            width: 90%;
            max-width: 400px;
            height: 300px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-radius: 2px;
            position: relative;
            transition: all 1.5s ease-in-out;
            transform-origin: center center;
            z-index: 2;
        }

        /* Đường lề đỏ của tập học sinh */
        .paper-container::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: #ff8585;
        }

        /* Ô chứa text giả lập dòng kẻ */
        .paper-textarea {
            width: 100%;
            height: 100%;
            padding: 20px 20px 20px 55px;
            border: none;
            resize: none;
            outline: none;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #444;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(transparent, transparent 27px, #e0e0e0 27px, #e0e0e0 28px);
            background-size: 100% 28px;
        }

        /* Nút trút giận */
        .vent-btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: #d9534f;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 83, 79, 0.4);
            transition: all 0.2s ease;
            z-index: 3;
        }

        .vent-btn:hover {
            background-color: #c9302c;
            transform: translateY(-2px);
        }

        .vent-btn:active {
            transform: translateY(1px);
        }

        /* Đồ họa cái thùng rác bằng CSS cơ bản */
        .trash-can {
            position: absolute;
            bottom: -20px;
            width: 80px;
            height: 90px;
            background: #555;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            opacity: 0;
            transform: translateY(50px) scale(0.8);
            transition: all 0.5s ease;
            z-index: 1;
        }

        .trash-can::before { /* Nắp thùng rác */
            content: '';
            position: absolute;
            top: -12px;
            left: -5px;
            width: 90px;
            height: 12px;
            background: #444;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        /* Trạng thái hiện thùng rác lên */
        .trash-can.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Nắp thùng rác mở ra khi giấy bay vào */
        .trash-can.open::before {
            transform: rotate(-45deg) translate(-10px, -10px);
        }

        /* ANIMATION HIỆU ỨNG VO GIẤY NÉM ĐI */
        .crumple-and-throw {
            animation: crumple 1s forwards, throw 0.8s 0.8s forwards;
        }

        @keyframes crumple {
            0% { transform: scale(1) rotate(0deg); border-radius: 2px; }
            50% { background: #eee; }
            100% { 
                transform: scale(0.15) rotate(720deg); 
                border-radius: 50%; /* Biến thành viên giấy tròn */
                box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
                background: #ddd;
            }
        }

        @keyframes throw {
            0% { transform: scale(0.15) translateY(0) rotate(720deg); opacity: 1; }
            100% { transform: scale(0.05) translateY(220px) rotate(1080deg); opacity: 0; }
        }

        /* Hiệu ứng thùng rác mang quăng đi chỗ khác */
        .trash-away {
            animation: walkAway 1s forwards;
        }

        @keyframes walkAway {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(300px, -50px) scale(0.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Có ấm ức gì, viết hết ra đây!</h1>

    <div class="workspace">
        <div class="paper-container" id="paper">
            <textarea class="paper-textarea" id="text-area" placeholder="Nhập những điều làm bạn bực mình ở đây..."></textarea>
        </div>

        <div class="trash-can" id="trash"></div>
    </div>

    <button class="vent-btn" id="vent-btn" onclick="startVenting()">Trút Giận!</button>

    <script>
        function startVenting() {
            const paper = document.getElementById('paper');
            const textarea = document.getElementById('text-area');
            const trash = document.getElementById('trash');
            const btn = document.getElementById('vent-btn');

            if (textarea.value.trim() === "") {
                alert("Hãy viết gì đó trước khi trút giận nhé!");
                return;
            }

            // Vô hiệu hóa nút và textarea lúc đang chạy hiệu ứng
            btn.disabled = true;
            textarea.disabled = true;

            // Bước 1: Hiện thùng rác ra
            trash.classList.add('show');

            // Bước 2: Sau 0.5s (khi thùng rác hiện xong), mở nắp thùng rác và vo giấy quăng đi
            setTimeout(() => {
                trash.classList.add('open');
                paper.classList.add('crumple-and-throw');
            }, 600);

            // Bước 3: Sau khi giấy lọt vào thùng rác (khoảng 1.6s từ đầu), đóng nắp lại
            setTimeout(() => {
                trash.classList.remove('open');
            }, 1700);

            // Bước 4: Đem thùng rác đi đổ (quăng thùng rác đi)
            setTimeout(() => {
                trash.classList.add('trash-away');
            }, 2200);

            // Bước 5: Reset lại mọi thứ để người dùng chơi tiếp lượt mới
            setTimeout(() => {
                // Xóa chữ cũ
                textarea.value = "";
                textarea.disabled = false;
                
                // Reset class để giấy và thùng rác trở lại trạng thái ban đầu
                paper.classList.remove('crumple-and-throw');
                trash.className = "trash-can"; // reset sạch class
                
                btn.disabled = false;
            }, 3500);
        }
    </script>

</body>
</html>

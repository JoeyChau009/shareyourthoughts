<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp Thư Ẩn Danh - Nơi Gửi Gắm Tâm Tư</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Giao diện bầu trời đêm sâu thẳm rải sao li ti bằng CSS */
            background: radial-gradient(circle at bottom, #0d1b2a 0%, #010811 100%);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 30px);
            background-size: 400px 400px, 280px 280px, 190px 190px;
            background-position: 0 0, 50px 70px, 110px 150px;
            
            /* Font chữ theo yêu cầu */
            font-family: 'Times New Roman', Times, serif;
            color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
        }

        p.description {
            text-align: center;
            color: #cbd5e1;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Khung viết thư */
        .letter-box {
            position: relative;
            background: #fffdf6; /* Màu giấy thư cổ điển hoài niệm */
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            padding: 25px;
            margin-bottom: 20px;
        }

        .letter-box::before {
            content: '';
            position: absolute;
            left: 35px;
            top: 0;
            width: 1px;
            height: 100%;
            background: #f1a7a7;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: none;
            resize: none;
            outline: none;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #2c3e50;
            padding-left: 25px;
            background: linear-gradient(transparent, transparent 27px, rgba(0,0,0,0.05) 27px, rgba(0,0,0,0.05) 28px);
            background-size: 100% 28px;
        }

        /* Nút gửi */
        .btn-send {
            display: block;
            width: 100%;
            padding: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(135deg, #4a5759, #2b2d42);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-send:hover {
            background: linear-gradient(135deg, #637375, #3d405b);
            transform: translateY(-2px);
        }

        /* Phân tách vùng chủ Web (Tư vấn viên) */
        .admin-section {
            width: 100%;
            max-width: 650px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px dashed rgba(255,255,255,0.3);
            padding: 25px;
            border-radius: 16px;
        }

        .admin-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
            color: #94a3b8;
        }

        .no-letter {
            text-align: center;
            color: #64748b;
            font-style: italic;
            padding: 20px 0;
        }

        /* Danh sách các bức thư nhận được */
        .letter-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #64748b;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
            position: relative;
        }

        .letter-time {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .letter-content {
            font-size: 1.1rem;
            line-height: 1.5;
            white-space: pre-wrap; /* Giữ nguyên xuống dòng của người viết */
            color: #e2e8f0;
        }

        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Times New Roman', Times, serif;
        }
        
        .btn-delete:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hộp Thư Ẩn Danh</h1>
        <p class="description">Đừng giữ những gánh nặng tâm lý một mình. Hãy viết hết những điều đè nặng trong lòng bạn vào đây, tôi luôn ở đây để lắng nghe và chia sẻ cùng bạn.</p>
        
        <div class="letter-box">
            <textarea id="sender-text" placeholder="Hãy viết những điều bạn muốn chia sẻ tại đây... (Danh tính của bạn hoàn toàn được bảo mật)"></textarea>
        </div>
        <button class="btn-send" onclick="sendLetter()">Thả Thư Vào Hộp</button>
    </div>

    <div class="admin-section">
        <div class="admin-title">Hòm Thư Đến (Chỉ Chủ Web Nhìn Thấy)</div>
        <div id="letter-list">
            </div>
    </div>

    <script>
        // Hàm load toàn bộ thư cũ lên khi mở trang
        document.addEventListener("DOMContentLoaded", function() {
            displayLetters();
        });

        // Hàm xử lý khi người dùng ấn gửi thư
        function sendLetter() {
            const textarea = document.getElementById("sender-text");
            const content = textarea.value.trim();

            if (content === "") {
                alert("Bạn chưa điền tâm tư vào thư kìa!");
                return;
            }

            // Lấy thời gian hiện tại lúc gửi
            const now = new Date();
            const timeString = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()} lúc ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

            // Tạo cấu trúc đối tượng bức thư mới
            const newLetter = {
                id: Date.now(),
                time: timeString,
                text: content
            };

            // Lấy danh sách thư cũ từ LocalStorage, thêm thư mới vào đầu mảng
            let letters = JSON.parse(localStorage.getItem("anonymous_letters")) || [];
            letters.unshift(newLetter);

            // Lưu lại mảng mới vào LocalStorage
            localStorage.setItem("anonymous_letters", JSON.stringify(letters));

            // Reset ô nhập và thông báo thành công
            textarea.value = "";
            alert("Bức thư của bạn đã lặng lẽ bay vào hòm thư. Cảm ơn bạn vì đã chia sẻ!");

            // Cập nhật lại danh sách thư hiển thị bên dưới ngay lập tức
            displayLetters();
        }

        // Hàm hiển thị danh sách thư ở khu vực quản trị
        function displayLetters() {
            const listContainer = document.getElementById("letter-list");
            let letters = JSON.parse(localStorage.getItem("anonymous_letters")) || [];

            if (letters.length === 0) {
                listContainer.innerHTML = '<div class="no-letter">Hiện tại chưa có bức thư ẩn danh nào được gửi đến.</div>';
                return;
            }

            let htmlContent = "";
            letters.forEach(letter => {
                htmlContent += `
                    <div class="letter-item">
                        <button class="btn-delete" onclick="deleteLetter(${letter.id})">[Xóa thư]</button>
                        <div class="letter-time">Nhận được vào ngày: ${letter.time}</div>
                        <div class="letter-content">${escapeHTML(letter.text)}</div>
                    </div>
                `;
            });
            listContainer.innerHTML = htmlContent;
        }

        // Hàm xóa thư khi bạn đã tư vấn xong hoặc muốn lọc bớt
        function deleteLetter(id) {
            if (confirm("Bạn có chắc chắn muốn xóa bức thư này không?")) {
                let letters = JSON.parse(localStorage.getItem("anonymous_letters")) || [];
                letters = letters.filter(letter => letter.id !== id);
                localStorage.setItem("anonymous_letters", JSON.stringify(letters));
                displayLetters();
            }
        }

        // Hàm lọc ký tự đặc biệt để chống lỗi hiển thị văn bản (XSS Security)
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>

</body>
</html>

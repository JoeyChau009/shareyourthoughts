<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Trút Giận - Nơi Vứt Bỏ Muộn Phiền</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #eef2f3;
            background: linear-gradient(to right, #eef2f3, #8e9eab);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p.subtitle {
            color: #555;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        /* Thanh chọn mẫu giấy */
        .color-picker {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .color-dot:hover {
            transform: scale(1.15);
        }

        .color-dot.active {
            border-color: #333;
            transform: scale(1.1);
        }

        /* Các mẫu màu giấy */
        .dot-white { background: #ffffff; }
        .dot-pink { background: #ffd3b6; }
        .dot-yellow { background: #fff59d; }
        .dot-dark { background: #37474f; }

        /* Vùng không gian chứa giấy và thùng rác */
        .workspace {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Đồ họa miếng giấy gốc */
        .paper-container {
            width: 90%;
            max-width: 400px;
            height: 300px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-radius: 2px;
            position: relative;
            transition: background 0.3s ease, transform 1.5s ease-in-out;
            transform-origin: center center;
            z-index: 2;
        }

        /* Đường lề đỏ */
        .paper-container::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: #ff8585;
        }

        /* Ô chứa text giả lập dòng kẻ */
        .paper-textarea {
            width: 100%;
            height: 100%;
            padding: 20px 20px 20px 55px;
            border: none;
            resize: none;
            outline: none;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #444;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(transparent, transparent 27px, rgba(0,0,0,0.08) 27px, rgba(0,0,0,0.08) 28px);
            background-size: 100% 28px;
            transition: color 0.3s ease;
        }

        /* Cấu hình màu sắc động cho các mẫu giấy thông qua Class */
        .paper-white { background-color: #ffffff; }
        .paper-white textarea { color: #444; }

        .paper-pink { background-color: #ffd3b6; }
        .paper-pink textarea { color: #5d4037; }

        .paper-yellow { background-color: #fff59d; }
        .paper-yellow textarea { color: #4e342e; }

        .paper-dark { background-color: #37474f; }
        .paper-dark textarea { color: #eceff1; background: linear-gradient(transparent, transparent 27px, rgba(255,255,255,0.15) 27px, rgba(255,255,255,0.15) 28px); background-size: 100% 28px; }

        /* Nút trút giận */
        .vent-btn {
            margin-top: 15px;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: #d9534f;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 83, 79, 0.4);
            transition: all 0.2s ease;
            z-index: 3;
        }

        .vent-btn:hover {
            background-color: #c9302c;
            transform: translateY(-2px);
        }

        .vent-btn:active {
            transform: translateY(1px);
        }

        /* Đồ họa cái thùng rác */
        .trash-can {
            position: absolute;
            bottom: -10px;
            width: 80px;
            height: 90px;
            background: #555;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            opacity: 0;
            transform: translateY(50px) scale(0.8);
            transition: all 0.5s ease;
            z-index: 1;
        }

        .trash-can::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -5px;
            width: 90px;
            height: 12px;
            background: #444;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .trash-can.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .trash-can.open::before {
            transform: rotate(-45deg) translate(-10px, -10px);
        }

        /* ANIMATION */
        .crumple-and-throw {
            animation: crumple 1s forwards, throw 0.8s 0.8s forwards;
        }

        @keyframes crumple {
            0% { transform: scale(1) rotate(0deg); border-radius: 2px; }
            100% { 
                transform: scale(0.15) rotate(720deg); 
                border-radius: 50%; /* Biến thành viên giấy tròn */
                box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
            }
        }

        @keyframes throw {
            0% { transform: scale(0.15) translateY(0) rotate(720deg); opacity: 1; }
            100% { transform: scale(0.05) translateY(240px) rotate(1080deg); opacity: 0; }
        }

        .trash-away {
            animation: walkAway 1s forwards;
        }

        @keyframes walkAway {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(350px, -60px) scale(0.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Góc Trút Giận</h1>
    <p class="subtitle">Chọn một màu giấy, viết hết ấm ức rồi ném bay đi!</p>

    <div class="color-picker" id="picker-container">
        <div class="color-dot dot-white active" onclick="changePaperColor('white', this)"></div>
        <div class="color-dot dot-pink" onclick="changePaperColor('pink', this)"></div>
        <div class="color-dot dot-yellow" onclick="changePaperColor('yellow', this)"></div>
        <div class="color-dot dot-dark" onclick="changePaperColor('dark', this)"></div>
    </div>

    <div class="workspace">
        <div class="paper-container paper-white" id="paper">
            <textarea class="paper-textarea" id="text-area" placeholder="Nhập những điều làm bạn bực mình ở đây..."></textarea>
        </div>

        <div class="trash-can" id="trash"></div>
    </div>

    <button class="vent-btn" id="vent-btn" onclick="startVesting()">Trút Giận!</button>

    <script>
        // Hàm xử lý đổi màu giấy khi click chọn mẫu
        function changePaperColor(colorName, element) {
            const paper = document.getElementById('paper');
            
            // Xóa toàn bộ class màu cũ của tờ giấy
            paper.classList.remove('paper-white', 'paper-pink', 'paper-yellow', 'paper-dark');
            // Thêm class màu mới
            paper.classList.add('paper-' + colorName);

            // Cập nhật trạng thái "active" trên thanh chọn
            const dots = document.querySelectorAll('.color-dot');
            dots.forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');
        }

        // Hàm kích hoạt hiệu ứng ném giấy và quăng thùng rác
        function startVesting() {
            const paper = document.getElementById('paper');
            const textarea = document.getElementById('text-area');
            const trash = document.getElementById('trash');
            const btn = document.getElementById('vent-btn');
            const picker = document.getElementById('picker-container');

            if (textarea.value.trim() === "") {
                alert("Hãy viết gì đó trước khi ném đi nhé!");
                return;
            }

            // Khóa tương tác khi đang chạy hiệu ứng
            btn.disabled = true;
            textarea.disabled = true;
            picker.style.pointerEvents = 'none'; // Không cho đổi màu lúc đang ném

            // Bước 1: Hiện thùng rác
            trash.classList.add('show');

            // Bước 2: Sau 0.6s, mở nắp thùng và vo tròn ném giấy đi
            setTimeout(() => {
                trash.classList.add('open');
                paper.classList.add('crumple-and-throw');
            }, 600);

            // Bước 3: Sau khi giấy rơi vào (1.7s), đóng nắp thùng rác
            setTimeout(() => {
                trash.classList.remove('open');
            }, 1700);

            // Bước 4: Sau khi đóng nắp (2.2s), quăng cả cái thùng rác đi
            setTimeout(() => {
                trash.classList.add('trash-away');
            }, 2200);

            // Bước 5: Sau khi mọi thứ biến mất (3.5s), reset trạng thái để chơi lượt mới
            setTimeout(() => {
                textarea.value = "";
                textarea.disabled = false;
                
                paper.classList.remove('crumple-and-throw');
                trash.className = "trash-can"; // Reset sạch hiệu ứng thùng rác
                
                btn.disabled = false;
                picker.style.pointerEvents = 'auto'; // Mở lại tính năng chọn màu
            }, 3500);
        }
    </script>

</body>
</html>
